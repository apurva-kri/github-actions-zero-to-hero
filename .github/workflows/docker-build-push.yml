name: Docker Build & Push

on:
  push:
   branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3

        with:
         username: ${{ vars.DOCKER_HUB_USERNAME}}
         password: ${{ secrets.DOCKER_HUB_TOKEN}}
      
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |  # pipe use for miltiple lines
           ${{ vars.DOCKER_HUB_USERNAME}}/github-actions-app:${{ github.GITHUB_HEAD_REF}}
           ${{ vars.DOCKER_HUB_USERNAME}}/github-actions-app:latest
           ${{ vars.DOCKER_HUB_USERNAME}}/github-actions-app:${{ github.GITHUB_SHA}} #tells commmit id



